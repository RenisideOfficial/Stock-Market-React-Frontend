<!-- index.html -->
<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/logo.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- Primary Meta Tags -->
    <title>StockMart - Multiplayer Stock Trading Simulator</title>
    <meta
      name="title"
      content="StockMart - Multiplayer Stock Trading Simulator" />
    <meta
      name="description"
      content="Practice trading stocks in real-time with friends. Learn investing strategies risk-free in our multiplayer stock market simulator." />
    <meta
      name="keywords"
      content="stock market, trading simulator, invest, stocks, multiplayer, finance, learning" />

    <!-- Open Graph / Facebook -->
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://stockmart.app/" />
    <meta
      property="og:title"
      content="StockMart - Multiplayer Stock Trading Simulator" />
    <meta
      property="og:description"
      content="Practice trading stocks in real-time with friends. Learn investing strategies risk-free in our multiplayer stock market simulator." />
    <meta property="og:image" content="https://stockmart.app/og-image.png" />

    <!-- Twitter -->
    <meta property="twitter:card" content="summary_large_image" />
    <meta property="twitter:url" content="https://stockmart.app/" />
    <meta
      property="twitter:title"
      content="StockMart - Multiplayer Stock Trading Simulator" />
    <meta
      property="twitter:description"
      content="Practice trading stocks in real-time with friends. Learn investing strategies risk-free in our multiplayer stock market simulator." />
    <meta
      property="twitter:image"
      content="https://stockmart.app/og-image.png" />

    <!-- Theme Color -->
    <meta name="theme-color" content="#00b8d4" />

    <!-- Preconnect to APIs -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />

    <!-- Fonts are handled by @fontsource packages -->

    <link
      rel="stylesheet"
      href="https://fonts.googleapis.com/css2?family=Inter:ital,wght@0,100..900;1,100..900&display=swap" />
    <link
      rel="stylesheet"
      href="https://fonts.googleapis.com/css2?family=Manrope:wght@100..800&display=swap" />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
